workflows:
  android-workflow:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 22.13.0
    scripts:
      - name: Setup pnpm
        script: |
          npm install -g pnpm --force
          node --version
          pnpm --version
      - name: Install dependencies
        script: |
          cd artifacts/mobile
          echo "enable-pre-post-scripts=true" >> .npmrc
          pnpm install --frozen-lockfile --ignore-scripts
      - name: Build APK
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform android --no-install
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - artifacts/mobile/android/app/build/outputs/**/*.apk
