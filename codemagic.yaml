workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.17.0
    scripts:
      - name: Install dependencies
        script: |
          cd artifacts/mobile
          yarn install --ignore-engines
      - name: Build APK
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease
    artifacts:
      - artifacts/mobile/android/app/build/outputs/**/*.apk
