workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.17.0
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm
      - name: Install dependencies
        script: pnpm install
      - name: Build APK
        script: |
          npx expo prebuild --platform android
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
