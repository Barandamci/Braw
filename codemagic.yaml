workflows:
  android-workflow:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
    scripts:
      - name: Setup pnpm
        script: |
          npm install -g pnpm
          node --version
          pnpm --version
      - name: Install dependencies
        script: |
          cd artifacts/mobile
          pnpm install --frozen-lockfile
      - name: Build APK
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform android --no-install
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
    artifacts:
      - artifacts/mobile/android/app/build/outputs/**/*.apk
