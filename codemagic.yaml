workflows:
  android-workflow:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 18.17.0
    scripts:
      - name: Setup
        script: |
          node --version
          npm --version
      - name: Install dependencies
        script: |
          cd artifacts/mobile
          npm install --legacy-peer-deps
      - name: Build APK
        script: |
          cd artifacts/mobile
          npx expo prebuild --platform android --no-install
          cd android
          ./gradlew assembleRelease
    artifacts:
      - artifacts/mobile/android/app/build/outputs/**/*.apk
